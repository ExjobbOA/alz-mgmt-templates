name: Continuous Delivery

on:
  workflow_call:
    inputs:
      platform_ref:
        type: string
        default: main
      parameters_file_name:
        description: "Path to JSON parameters file"
        required: false
        type: string
        default: "platform.json" # <- align with your repo
      skip_what_if:
        default: false
        type: boolean

      governance-int-root:
        type: boolean
        default: true
      governance-landingzones:
        type: boolean
        default: true
      governance-landingzones-corp:
        type: boolean
        default: true
      governance-landingzones-online:
        type: boolean
        default: true
      governance-platform:
        type: boolean
        default: true
      governance-platform-connectivity:
        type: boolean
        default: true
      governance-platform-identity:
        type: boolean
        default: true
      governance-platform-management:
        type: boolean
        default: true
      governance-platform-security:
        type: boolean
        default: true
      governance-sandbox:
        type: boolean
        default: true
      governance-decommissioned:
        type: boolean
        default: true

      governance-platform-rbac:
        type: boolean
        default: true
      governance-platform-connectivity-rbac:
        type: boolean
        default: true
      governance-landingzones-rbac:
        type: boolean
        default: true

      networking:
        type: boolean
        default: true
      core-logging:
        type: boolean
        default: true

jobs:
  whatif:
    name: What If
    runs-on: ubuntu-latest
    concurrency: mgmt-tfstate
    environment: alz-mgmt-plan
    permissions:
      id-token: write
      contents: read
    if: ${{ !inputs.skip_what_if }}
    env:
      PARAMETERS_FILE_NAME: ${{ inputs.parameters_file_name }}

    steps:
      - name: Show inputs
        run: |
          echo '${{ toJson(inputs) }}'

      - name: Checkout Config Repo
        uses: actions/checkout@v4

      - name: Checkout Engine Repo (platform templates)
        uses: actions/checkout@v4
        with:
          repository: ExjobbOA/alz-mgmt-templates
          ref: ${{ inputs.platform_ref }}
          path: platform

      - name: Get Bicep Variables
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-variables@main
        with:
          parameters_file_name: ${{ env.PARAMETERS_FILE_NAME }}

      - name: Install Bicep and Update Az Module
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-installer@main

      - name: Bicep Build & Lint All Modules
        shell: pwsh
        run: |
          $output = @()
          Get-ChildItem -Recurse -Filter '*.bicep' -Exclude '*.bicep' | Where-Object { $_.FullName -notlike "*\.bicep\*" } | ForEach-Object {
              Write-Information "==> Attempting Bicep Build For File: $_" -InformationAction Continue
              $bicepOutput = bicep build $_.FullName 2>&1
              if ($LastExitCode -ne 0)
              {
                foreach ($item in $bicepOutput) {
                  $output += "$($item) `r`n"
                }
              }
              else
              {
                echo "Bicep Build Successful for File: $_"
              }
          }
          if ($output.length -gt 0) {
            throw $output
          }

      - name: OIDC Login to Tenant
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Check for First Deployment
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-first-deployment-check@main
        with:
          managementGroupId: ${{ env.INTERMEDIATE_ROOT_MANAGEMENT_GROUP_ID }}
          parentManagementGroupId: ${{ env.MANAGEMENT_GROUP_ID }}

      # ---- WHAT-IF in proven order (same as Apply order below) ----

      - name: "Plan: Governance-Intermediate Root"
        if: ${{ inputs.governance-int-root }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-int-root"
          displayName: "Governance-Intermediate Root"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/int-root/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/int-root.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          managementGroupId: ${{ env.MANAGEMENT_GROUP_ID }}

      - name: "Plan: Governance-Landing Zones"
        if: ${{ inputs.governance-landingzones }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-landingzones"
          displayName: "Governance-Landing Zones"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/landingzones/\
            main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/landingzones/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_LANDINGZONES }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Landing Zones Corp"
        if: ${{ inputs.governance-landingzones-corp }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-landingzones-corp"
          displayName: "Governance-Landing Zones Corp"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/landingzones/\
            landingzones-corp/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/landingzones/la\
            ndingzones-corp/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_CORP }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Landing Zones Online"
        if: ${{ inputs.governance-landingzones-online }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-landingzones-online"
          displayName: "Governance-Landing Zones Online"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/landingzones/\
            landingzones-online/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/landingzones/la\
            ndingzones-online/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_ONLINE }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Platform"
        if: ${{ inputs.governance-platform }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-platform"
          displayName: "Governance-Platform"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/platform/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/platform/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_PLATFORM }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Platform Connectivity"
        if: ${{ inputs.governance-platform-connectivity && env.PLATFORM_MODE != 'simple'
          }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-platform-connectivity"
          displayName: "Governance-Platform Connectivity"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/platform/plat\
            form-connectivity/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/platform/platfo\
            rm-connectivity/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_CONNECTIVITY }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Platform Identity"
        if: ${{ inputs.governance-platform-identity && env.PLATFORM_MODE != 'simple' }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-platform-identity"
          displayName: "Governance-Platform Identity"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/platform/plat\
            form-identity/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/platform/platfo\
            rm-identity/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_IDENTITY }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Platform Management"
        if: ${{ inputs.governance-platform-management && env.PLATFORM_MODE != 'simple'
          }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-platform-management"
          displayName: "Governance-Platform Management"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/platform/plat\
            form-management/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/platform/platfo\
            rm-management/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_MANAGEMENT }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Platform Security"
        if: ${{ inputs.governance-platform-security && env.PLATFORM_MODE != 'simple' }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-platform-security"
          displayName: "Governance-Platform Security"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/platform/plat\
            form-security/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/platform/platfo\
            rm-security/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_SECURITY }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Sandbox"
        if: ${{ inputs.governance-sandbox }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-sandbox"
          displayName: "Governance-Sandbox"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/sandbox/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/sandbox/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_SANDBOX }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Decommissioned"
        if: ${{ inputs.governance-decommissioned }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-decommissioned"
          displayName: "Governance-Decommissioned"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/decommissione\
            d/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/decommissioned/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_DECOMMISSIONED }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Platform RBAC"
        if: ${{ inputs.governance-platform-rbac }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-platform-rbac"
          displayName: "Governance-Platform RBAC"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/platform/main\
            -rbac.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/platform/main-rbac.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_PLATFORM }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Platform Connectivity RBAC"
        if: ${{ inputs.governance-platform-connectivity-rbac && env.PLATFORM_MODE !=
          'simple' }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-platform-connectivity-rbac"
          displayName: "Governance-Platform Connectivity RBAC"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/platform/plat\
            form-connectivity/main-rbac.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/platform/platfo\
            rm-connectivity/main-rbac.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_CONNECTIVITY }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Governance-Landing Zones RBAC"
        if: ${{ inputs.governance-landingzones-rbac }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "governance-landingzones-rbac"
          displayName: "Governance-Landing Zones RBAC"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/landingzones/\
            main-rbac.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/landingzones/ma\
            in-rbac.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"
          targetManagementGroupId: ${{ env.MG_NAME_LANDINGZONES }}
          skipWhatIfIfTargetMgMissing: "true"

      - name: "Plan: Networking - Hub"
        if: ${{ inputs.networking && env.NETWORK_TYPE == 'hubnetworking' }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "networking-hub"
          displayName: "Networking - Hub"
          templateFilePath: "platform/templates/networking/hubnetworking/main.bicep"
          templateParametersFilePath: "config/networking/hubnetworking/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_CONNECTIVITY }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "subscription"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"

      - name: "Plan: Core-Logging"
        if: ${{ inputs.core-logging }}
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-deploy@main
        with:
          name: "core-logging"
          displayName: "Core-Logging"
          templateFilePath: "platform/templates/core/logging/main.bicep"
          templateParametersFilePath: "config/core/logging/main.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "subscription"
          whatIfEnabled: "true"
          firstRunWhatIf: "false"

  deploy:
    name: Deploy - Sequential Monolith (Stacks)
    needs: [ whatif ]
    if: ${{ always() && !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    concurrency: mgmt-tfstate
    environment: alz-mgmt-apply
    permissions:
      id-token: write
      contents: read
    env:
      PARAMETERS_FILE_NAME: ${{ inputs.parameters_file_name }}

    steps:
      - name: Show inputs
        run: |
          echo '${{ toJson(inputs) }}'

      - name: Checkout Config Repo
        uses: actions/checkout@v4

      - name: Checkout Engine Repo (platform templates)
        uses: actions/checkout@v4
        with:
          repository: ExjobbOA/alz-mgmt-templates
          ref: ${{ inputs.platform_ref }}
          path: platform

      - name: Get Bicep Variables
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-variables@main
        with:
          parameters_file_name: ${{ env.PARAMETERS_FILE_NAME }}

      - name: Install Bicep and Update Az Module
        uses: ExjobbOA/alz-mgmt-templates/.github/actions/bicep-installer@main

      - name: Bicep Build & Lint All Modules
        shell: pwsh
        run: |
          $output = @()
          Get-ChildItem -Recurse -Filter '*.bicep' -Exclude '*.bicep' | Where-Object { $_.FullName -notlike "*\.bicep\*" } | ForEach-Object {
              Write-Information "==> Attempting Bicep Build For File: $_" -InformationAction Continue
              $bicepOutput = bicep build $_.FullName 2>&1
              if ($LastExitCode -ne 0)
              {
                foreach ($item in $bicepOutput) {
                  $output += "$($item) `r`n"
                }
              }
              else
              {
                echo "Bicep Build Successful for File: $_"
              }
          }
          if ($output.length -gt 0) {
            throw $output
          }

      - name: OIDC Login to Tenant
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      # 0) Pre-create full ALZ MG hierarchy (cold-start safety)
      # Creating a NEW Deployment Stack requires ARM to validate permissions for every scope in
      # the template before executing any resources. On a post-cleanup tenant, no MGs exist yet,
      # so ARM fails at permission check before it can create any of them — circular deadlock.
      # Fix: pre-create the full MG skeleton in parent-first order so all scopes exist and RBAC
      # inheritance is resolvable when the stacks run. Idempotent — skips existing MGs.
      #
      # Brownfield: MG names are read from MG_NAME_* env vars (sourced from platform.json) so
      # tenants with non-default names (e.g. 'ALZ-landingzones', 'ALZ-sandboxes') resolve to the
      # existing MGs and the loop skips them. With hardcoded literals, Get-AzManagementGroup
      # would miss the existing hierarchy and create parallel duplicates as siblings.
      - name: "Pre-create ALZ MG hierarchy (cold-start)"
        shell: pwsh
        run: |
          $intRoot  = $env:INTERMEDIATE_ROOT_MANAGEMENT_GROUP_ID
          $tenantRg = $env:MANAGEMENT_GROUP_ID

          # Resolve MG names from platform.json env vars with greenfield defaults.
          # IsNullOrWhiteSpace covers both unset and empty-string cases (Build-PlatformJson
          # emits empty strings for archetypes it can't detect in simple-mode tenants).
          function Get-MgName($val, $default) {
            if ([string]::IsNullOrWhiteSpace($val)) { return $default } else { return $val }
          }
          $mgLandingzones   = Get-MgName $env:MG_NAME_LANDINGZONES   'landingzones'
          $mgPlatform       = Get-MgName $env:MG_NAME_PLATFORM       'platform'
          $mgSandbox        = Get-MgName $env:MG_NAME_SANDBOX        'sandbox'
          $mgDecommissioned = Get-MgName $env:MG_NAME_DECOMMISSIONED 'decommissioned'
          $mgCorp           = Get-MgName $env:MG_NAME_CORP           'corp'
          $mgOnline         = Get-MgName $env:MG_NAME_ONLINE         'online'
          $mgConnectivity   = Get-MgName $env:MG_NAME_CONNECTIVITY   'connectivity'
          $mgIdentity       = Get-MgName $env:MG_NAME_IDENTITY       'identity'
          $mgManagement     = Get-MgName $env:MG_NAME_MANAGEMENT     'management'
          $mgSecurity       = Get-MgName $env:MG_NAME_SECURITY       'security'

          # ALZ MG hierarchy in parent-first order.
          # SubMgOnly = $true entries are skipped in simple mode (no sub-platform MGs needed).
          $platformMode = $env:PLATFORM_MODE
          $mgs = @(
            [pscustomobject]@{ Name = $intRoot;          Parent = $tenantRg;       SubMgOnly = $false },
            [pscustomobject]@{ Name = $mgLandingzones;   Parent = $intRoot;        SubMgOnly = $false },
            [pscustomobject]@{ Name = $mgPlatform;       Parent = $intRoot;        SubMgOnly = $false },
            [pscustomobject]@{ Name = $mgSandbox;        Parent = $intRoot;        SubMgOnly = $false },
            [pscustomobject]@{ Name = $mgDecommissioned; Parent = $intRoot;        SubMgOnly = $false },
            [pscustomobject]@{ Name = $mgCorp;           Parent = $mgLandingzones; SubMgOnly = $false },
            [pscustomobject]@{ Name = $mgOnline;         Parent = $mgLandingzones; SubMgOnly = $false },
            [pscustomobject]@{ Name = $mgConnectivity;   Parent = $mgPlatform;     SubMgOnly = $true  },
            [pscustomobject]@{ Name = $mgIdentity;       Parent = $mgPlatform;     SubMgOnly = $true  },
            [pscustomobject]@{ Name = $mgManagement;     Parent = $mgPlatform;     SubMgOnly = $true  },
            [pscustomobject]@{ Name = $mgSecurity;       Parent = $mgPlatform;     SubMgOnly = $true  }
          )

          $anyCreated = $false
          foreach ($mg in $mgs) {
            if ($mg.SubMgOnly -and $platformMode -eq 'simple') {
              Write-Host "  - Skipping '$($mg.Name)' (PLATFORM_MODE=simple)"
              continue
            }
            $existing = Get-AzManagementGroup -GroupName $mg.Name -ErrorAction SilentlyContinue
            if ($null -ne $existing) {
              Write-Host "  v '$($mg.Name)' already exists — skipping."
            } else {
              Write-Host "  + Creating '$($mg.Name)' under '$($mg.Parent)'..."
              $created = $false
              for ($attempt = 1; $attempt -le 3; $attempt++) {
                try {
                  New-AzManagementGroup -GroupName $mg.Name `
                    -ParentId "/providers/Microsoft.Management/managementGroups/$($mg.Parent)" `
                    -ErrorAction Stop
                  $created = $true
                  break
                } catch {
                  if ($attempt -lt 3) {
                    Write-Warning "    Attempt $attempt failed: $($_.Exception.Message). Retrying in 30s..."
                    Start-Sleep -Seconds 30
                  } else {
                    throw
                  }
                }
              }
              if ($created) { $anyCreated = $true }
              # Brief pause between creations to avoid ARM throttling
              Start-Sleep -Seconds 5
            }
          }

          if ($anyCreated) {
            Write-Host "New MG(s) created. Waiting 60s for RBAC inheritance to propagate..."
            Start-Sleep -Seconds 60
            Write-Host "Done."
          } else {
            Write-Host "All MGs already exist — no wait needed."
          }

      # 1) Intermediate Root (MG stack at Tenant Root MG)
      - name: "Apply: Governance-Intermediate Root"
        if: ${{ inputs.governance-int-root }}
        uses: ./platform/.github/actions/bicep-deploy
        with:
          name: "governance-int-root"
          displayName: "Governance-Intermediate Root"
          templateFilePath: "platform/templates/core/governance/mgmt-groups/int-root/main.bicep"
          templateParametersFilePath: "config/core/governance/mgmt-groups/int-root.bicepparam"
          subscriptionId: "${{ env.SUBSCRIPTION_ID_MANAGEMENT }}"
          resourceGroupName: ""
          location: "${{ env.LOCATION }}"
          deploymentType: "managementGroup"
          whatIfEnabled: "false"
          firstRunWhatIf: "false"
